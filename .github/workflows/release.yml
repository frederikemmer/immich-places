name: Release and Publish

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    workflow_dispatch:

env:
    GHCR_REGISTRY: ghcr.io
    DOCKERHUB_REGISTRY: docker.io

permissions:
    contents: write
    packages: write

jobs:
    release:
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        outputs:
            new_tag: ${{ steps.create_tag.outputs.new_tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get latest tag
              id: get_latest_tag
              run: |
                  latest_tag=$(git tag --sort=-v:refname | head -1 || echo "v0.0.0")
                  echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

            - name: Create new tag
              id: create_tag
              env:
                  LATEST_TAG: ${{ steps.get_latest_tag.outputs.latest_tag }}
              run: |
                  major=$(echo "$LATEST_TAG" | cut -d. -f1 | tr -d 'v')
                  minor=$(echo "$LATEST_TAG" | cut -d. -f2)
                  patch=$(echo "$LATEST_TAG" | cut -d. -f3)
                  new_patch=$((patch + 1))
                  new_tag="v$major.$minor.$new_patch"
                  echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

            - name: Create and push tag
              env:
                  NEW_TAG: ${{ steps.create_tag.outputs.new_tag }}
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git tag "$NEW_TAG"
                  git push origin "$NEW_TAG"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.create_tag.outputs.new_tag }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-and-push:
        runs-on: ubuntu-latest
        needs: [release]
        if: ${{ !failure() }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: immich-places
                      context: .
                      dockerfile: ./Dockerfile
                    - image: immich-places-backend
                      context: ./backend
                      dockerfile: ./backend/Dockerfile

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.GHCR_REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.DOCKERHUB_REGISTRY }}
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: |
                      ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
                      ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}},value=${{ needs.release.outputs.new_tag }},enable=${{ needs.release.outputs.new_tag != '' }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_tag }},enable=${{ needs.release.outputs.new_tag != '' }}
                      type=sha,format=short

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  cache-from: type=gha,scope=${{ matrix.image }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}
